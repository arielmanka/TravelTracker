version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_tracker_backend
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8000
      - DATABASE_PATH=/app/data/travel_tracker.db
      - UPLOADS_DIR=/app/data/receipts
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_tracker_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
